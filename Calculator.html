<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Calculator</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0f;
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(0,255,180,0.07) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(0,180,255,0.07) 0%, transparent 60%);
      font-family: 'Share Tech Mono', monospace;
    }

    .calc-wrapper { position: relative; }

    .calc-wrapper::before {
      content: '';
      position: absolute;
      inset: -2px;
      border-radius: 24px;
      background: linear-gradient(135deg, #00ffb4, #0099ff, #00ffb4);
      background-size: 200% 200%;
      animation: borderSpin 4s linear infinite;
      z-index: 0;
    }

    @keyframes borderSpin {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .calculator {
      position: relative;
      z-index: 1;
      background: #111118;
      border-radius: 22px;
      padding: 24px;
      width: 320px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.05);
    }

    .display {
      background: #0d0d14;
      border-radius: 12px;
      padding: 16px 18px 12px;
      margin-bottom: 20px;
      border: 1px solid rgba(0,255,180,0.12);
      min-height: 90px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: flex-end;
      overflow: hidden;
    }

    /* اسم المطور */
    .name-tag {
      font-family: 'Orbitron', monospace;
      font-size: 13px;
      color: rgba(0,255,180,0.6);
      letter-spacing: 2px;
      text-transform: uppercase;
      align-self: flex-start;
      margin-bottom: 4px;
    }

    .display .expression {
      font-size: 13px;
      color: rgba(0,255,180,0.4);
      min-height: 18px;
      letter-spacing: 1px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
    }

    .display .result {
      font-family: 'Orbitron', monospace;
      font-size: 36px;
      font-weight: 700;
      color: #00ffb4;
      letter-spacing: 2px;
      text-shadow: 0 0 20px rgba(0,255,180,0.5);
      transition: font-size 0.15s;
      word-break: break-all;
      text-align: right;
    }

    .display .result.small { font-size: 24px; }
    .display .result.error { color: #ff4d6d; text-shadow: 0 0 20px rgba(255,77,109,0.5); font-size: 18px; }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    button {
      background: #1a1a25;
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 12px;
      color: #e0e0f0;
      font-family: 'Share Tech Mono', monospace;
      font-size: 18px;
      height: 60px;
      cursor: pointer;
      transition: all 0.12s ease;
      position: relative;
      overflow: hidden;
      outline: none;
      -webkit-tap-highlight-color: transparent;
    }

    button::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at center, rgba(255,255,255,0.15) 0%, transparent 70%);
      opacity: 0;
      transition: opacity 0.2s;
    }

    button:hover { background: #22222f; border-color: rgba(0,255,180,0.25); transform: translateY(-1px); }
    button:active::after { opacity: 1; }
    button:active { transform: scale(0.94) translateY(0); }

    button.op {
      background: rgba(0,153,255,0.12);
      border-color: rgba(0,153,255,0.3);
      color: #4dc3ff;
      font-size: 22px;
    }
    button.op:hover { background: rgba(0,153,255,0.22); }

    button.eq {
      background: linear-gradient(135deg, #00c896, #0099ff);
      border: none;
      color: #000;
      font-family: 'Orbitron', monospace;
      font-size: 22px;
      font-weight: 700;
      box-shadow: 0 4px 20px rgba(0,255,180,0.3);
    }
    button.eq:hover { box-shadow: 0 6px 28px rgba(0,255,180,0.5); transform: translateY(-2px); }
    button.eq:active { transform: scale(0.94); }

    button.clear {
      background: rgba(255,77,109,0.12);
      border-color: rgba(255,77,109,0.3);
      color: #ff4d6d;
    }
    button.clear:hover { background: rgba(255,77,109,0.22); }

    button.special {
      background: rgba(180,100,255,0.1);
      border-color: rgba(180,100,255,0.25);
      color: #c580ff;
    }
    button.special:hover { background: rgba(180,100,255,0.2); }

    button.power {
      background: rgba(255,180,0,0.1);
      border-color: rgba(255,180,0,0.3);
      color: #ffcc44;
      font-size: 16px;
    }
    button.power:hover { background: rgba(255,180,0,0.2); }

    @keyframes flash {
      0%   { box-shadow: 0 0 0 0 rgba(0,255,180,0.4); }
      100% { box-shadow: 0 0 0 14px rgba(0,255,180,0); }
    }
    button.flash { animation: flash 0.3s ease-out; }
  </style>
</head>
<body>

<div class="calc-wrapper">
  <div class="calculator">
    <div class="display">
      <div class="name-tag">Anis Ghanimi</div>
      <div class="expression" id="expression"></div>
      <div class="result" id="result">0</div>
    </div>
    <div class="buttons">
      <!-- Row 1 -->
      <button class="clear"   onclick="clearAll()">AC</button>
      <button class="special" onclick="toggleSign()">+/−</button>
      <button class="special" onclick="percentage()">%</button>
      <button class="op"      onclick="inputOp('/')">÷</button>

      <!-- Row 2 -->
      <button onclick="inputNum('7')">7</button>
      <button onclick="inputNum('8')">8</button>
      <button onclick="inputNum('9')">9</button>
      <button class="op" onclick="inputOp('*')">×</button>

      <!-- Row 3 -->
      <button onclick="inputNum('4')">4</button>
      <button onclick="inputNum('5')">5</button>
      <button onclick="inputNum('6')">6</button>
      <button class="op" onclick="inputOp('-')">−</button>

      <!-- Row 4 -->
      <button onclick="inputNum('1')">1</button>
      <button onclick="inputNum('2')">2</button>
      <button onclick="inputNum('3')">3</button>
      <button class="op" onclick="inputOp('+')">+</button>

      <!-- Row 5 -->
      <button onclick="inputNum('0')">0</button>
      <button onclick="inputDot()">.</button>
      <button class="power" onclick="inputOp('^')">xʸ</button>
      <button class="eq"    onclick="calculate()">=</button>
    </div>
  </div>
</div>

<script>
  let current  = '0';
  let expression = '';
  let justCalc = false;

  const resultEl = document.getElementById('result');
  const exprEl   = document.getElementById('expression');

  function updateDisplay() {
    resultEl.className = 'result';
    if (current.length > 10) resultEl.classList.add('small');
    resultEl.textContent = current;
    exprEl.textContent   = expression;
  }

  function inputNum(n) {
    if (justCalc) { current = n; expression = ''; justCalc = false; }
    else current = (current === '0' && n !== '.') ? n : current + n;
    updateDisplay();
  }

  function inputDot() {
    if (justCalc) { current = '0.'; expression = ''; justCalc = false; }
    else if (!current.includes('.')) current += '.';
    updateDisplay();
  }

  function inputOp(op) {
    justCalc = false;
    const symbols = { '+':'+', '-':'−', '*':'×', '/':'÷', '^':'xʸ' };
    window._rawLeft   = current;
    window._pendingOp = op;
    expression = current + ' ' + (symbols[op] || op);
    current = '0';
    updateDisplay();
  }

  function calculate() {
    if (!window._pendingOp || !window._rawLeft) return;
    const left  = parseFloat(window._rawLeft);
    const right = parseFloat(current);
    const op    = window._pendingOp;
    const symMap = { '+':'+', '-':'−', '*':'×', '/':'÷', '^':'xʸ' };

    exprEl.textContent = window._rawLeft + ' ' + (symMap[op] || op) + ' ' + current + ' =';

    let res;
    if      (op === '+') res = left + right;
    else if (op === '-') res = left - right;
    else if (op === '*') res = left * right;
    else if (op === '^') res = Math.pow(left, right);
    else if (op === '/') {
      if (right === 0) {
        current = 'لا يمكن القسمة على صفر';
        resultEl.className   = 'result error';
        resultEl.textContent = current;
        window._pendingOp    = null;
        return;
      }
      res = left / right;
    }

    res     = parseFloat(res.toPrecision(12));
    current = String(res);
    window._lastResult = res;
    window._pendingOp  = null;
    window._rawLeft    = null;
    justCalc = true;
    updateDisplay();
  }

  function clearAll() {
    current = '0'; expression = '';
    window._pendingOp = null; window._rawLeft = null;
    justCalc = false;
    updateDisplay();
  }

  function toggleSign() {
    current = String(parseFloat(current) * -1);
    updateDisplay();
  }

  function percentage() {
    current = String(parseFloat(current) / 100);
    updateDisplay();
  }

  // دعم لوحة المفاتيح
  document.addEventListener('keydown', e => {
    if ('0123456789'.includes(e.key))             inputNum(e.key);
    else if (e.key === '.')                        inputDot();
    else if (e.key === '+')                        inputOp('+');
    else if (e.key === '-')                        inputOp('-');
    else if (e.key === '*')                        inputOp('*');
    else if (e.key === '^')                        inputOp('^');
    else if (e.key === '/') { e.preventDefault();  inputOp('/'); }
    else if (e.key === 'Enter' || e.key === '=')   calculate();
    else if (e.key === 'Escape')                   clearAll();
    else if (e.key === 'Backspace') {
      current = current.length > 1 ? current.slice(0, -1) : '0';
      updateDisplay();
    }
  });
</script>
</body>
</html>
